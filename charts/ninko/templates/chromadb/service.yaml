{{- if .Values.chromadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ninko.chromadb.fullname" . }}
  namespace: {{ include "ninko.namespace" . }}
  labels:
    {{- include "ninko.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  type: ClusterIP
  selector:
    {{- include "ninko.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
{{- end }}
