{{- if not .Values.secrets.sqliteSecretsKey }}
  {{- fail "secrets.sqliteSecretsKey is required. Generate with: python3 -c \"import secrets; print(secrets.token_hex(32))\"" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ninko.fullname" . }}-secrets
  namespace: {{ include "ninko.namespace" . }}
  labels:
    {{- include "ninko.labels" . | nindent 4 }}
type: Opaque
stringData:
  SQLITE_SECRETS_KEY: {{ .Values.secrets.sqliteSecretsKey | quote }}
  {{- if .Values.backend.llm.apiKey }}
  LLM_API_KEY: {{ .Values.backend.llm.apiKey | quote }}
  {{- end }}
  {{- if .Values.searxng.enabled }}
  SEARXNG_SECRET_KEY: {{ .Values.searxng.secretKey | default (randAlphaNum 32) | quote }}
  {{- end }}
