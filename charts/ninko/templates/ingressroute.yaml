{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "ninko.backend.fullname" . }}
  namespace: {{ include "ninko.namespace" . }}
  labels:
    {{- include "ninko.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "ninko.backend.fullname" . }}
          port: 8000
  {{- if .Values.ingressRoute.tlsResolver }}
  tls:
    certResolver: {{ .Values.ingressRoute.tlsResolver | quote }}
  {{- end }}
{{- end }}
