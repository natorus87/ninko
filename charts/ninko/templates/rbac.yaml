{{- if and .Values.rbac.create .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ninko.fullname" . }}-k8s-manager
  labels:
    {{- include "ninko.labels" . | nindent 4 }}
rules:
  # Pods – read + delete (restart)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]
  # Deployments – read + patch/update (scale, rollout restart)
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Services, Namespaces, Events, PVCs, Nodes – read
  - apiGroups: [""]
    resources: ["services", "namespaces", "events", "persistentvolumeclaims", "nodes"]
    verbs: ["get", "list", "watch"]
  # Ingresses – read
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Kubernetes version API
  - nonResourceURLs: ["/version"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ninko.fullname" . }}-k8s-manager-binding
  labels:
    {{- include "ninko.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ninko.fullname" . }}-k8s-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "ninko.serviceAccountName" . }}
    namespace: {{ include "ninko.namespace" . }}
{{- end }}
