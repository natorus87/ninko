apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: kumio
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: searxng-settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
      volumes:
        - name: searxng-settings
          configMap:
            name: searxng-settings
            items:
            - key: settings.yml
              path: settings.yml
