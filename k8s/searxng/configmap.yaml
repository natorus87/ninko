apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: ninko
data:
  settings.yml: |
    use_default_settings: true
    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "searxng-secret-key-for-ninko"
    search:
      formats:
        - html
        - json
