apiVersion: v1
kind: Secret
metadata:
  name: ninko-secrets
  labels:
    app.kubernetes.io/name: ninko-backend
    app.kubernetes.io/part-of: ninko
type: Opaque
stringData:
  # Vor kubectl apply ersetzen — Key generieren mit:
  # python3 -c "import secrets; print(secrets.token_hex(32))"
  SQLITE_SECRETS_KEY: "REPLACE_WITH_YOUR_SQLITE_SECRETS_KEY"
