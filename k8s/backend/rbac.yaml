apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kumio-k8s-manager
  labels:
    app.kubernetes.io/name: kumio
    app.kubernetes.io/part-of: kumio
rules:
  # Pods – Read + Delete (Restart)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "delete"]

  # Deployments – Read + Patch (Scale, Rollout Restart)
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Services, Namespaces, Events – Read
  - apiGroups: [""]
    resources: ["services", "namespaces", "events", "persistentvolumeclaims", "nodes"]
    verbs: ["get", "list", "watch"]

  # Ingresses – Read
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]

  # Version API
  - nonResourceURLs: ["/version"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kumio-k8s-manager-binding
  labels:
    app.kubernetes.io/name: kumio
    app.kubernetes.io/part-of: kumio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kumio-k8s-manager
subjects:
  - kind: ServiceAccount
    name: kumio
    namespace: kumio
