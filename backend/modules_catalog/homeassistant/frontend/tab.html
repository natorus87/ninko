<!-- Home Assistant Dashboard Tab -->
<div id="ha-tab-content" class="module-tab-content">

    <!-- Header -->
    <div style="margin-bottom: 1.5rem;">
        <h2 style="font-size: 1.3rem; font-weight: 600; margin: 0 0 0.25rem; display: flex; align-items: center; gap: 0.5rem;">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home Assistant Dashboard
        </h2>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">
            Überwache den Status deiner Home Assistant Instanz und frage Smart Home Geräte ab.
        </p>
    </div>

    <!-- Controls -->
    <div class="k8s-controls">
        <select id="ha-connection-select" class="form-select"
            style="min-width: 220px; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-color);">
            <option value="">Lade Verbindungen...</option>
        </select>
        <button id="ha-refresh-btn" class="btn btn-refresh">Status aktualisieren</button>
        <button id="ha-fetch-lights-btn" class="btn btn-sm btn-action">Lichter abfragen</button>
    </div>

    <!-- Status Banner -->
    <div id="ha-status-alert" style="display: none; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1.5rem;
        border: 1px solid var(--border-color); background: var(--bg-card); font-size: 0.9rem;">
    </div>

    <!-- Content Area -->
    <div class="k8s-section">
        <div id="ha-content-area" style="color: var(--text-muted); font-size: 0.9rem;">
            Noch keine Daten geladen. Bitte wähle eine Verbindung und klicke auf &laquo;Status aktualisieren&raquo;.
        </div>
    </div>

</div>
